name: CI

permissions: {}

on:
  pull_request:
  push:
    branches:
      - alpha
      - beta
      - main
      - renovate/**

jobs:
  ci-optimization:
    name: CI optimization
    uses: dargmuesli/github-actions/.github/workflows/ci-optimization.yml@51cd57700bedc5b189c5dce3902645e00b4e4ccf # 5.5.3
    permissions:
      pull-requests: read
  release_semantic_dry:
    needs: ci-optimization
    if: needs.ci-optimization.outputs.continue == 'true'
    name: Release (semantic, dry)
    uses: dargmuesli/github-actions/.github/workflows/release-semantic.yml@51cd57700bedc5b189c5dce3902645e00b4e4ccf # 5.5.3
    permissions:
      contents: write
      id-token: write
    secrets:
      GH_APP_PRIVATE_KEY: ${{ secrets.GH_APP_PRIVATE_KEY }}
    with:
      DRY_RUN: true
      GH_APP_ID: ${{ vars.GH_APP_ID }}
  build:
    name: Build
    uses: dargmuesli/github-actions/.github/workflows/docker.yml@51cd57700bedc5b189c5dce3902645e00b4e4ccf # 5.5.3
    needs: release_semantic_dry
    permissions:
      packages: write
    with:
      BUILD_ADD_HOSTS: |
        app.localhost=127.0.0.1
      TAG: ${{ needs.release_semantic_dry.outputs.new_release_version }}
  release_semantic:
    needs: build
    name: Release (semantic)
    uses: dargmuesli/github-actions/.github/workflows/release-semantic.yml@51cd57700bedc5b189c5dce3902645e00b4e4ccf # 5.5.3
    permissions:
      contents: write
      id-token: write
    secrets:
      GH_APP_PRIVATE_KEY: ${{ secrets.GH_APP_PRIVATE_KEY }}
    with:
      GH_APP_ID: ${{ vars.GH_APP_ID }}
